<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Booking Kommo">
<title>Booking Kommo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; min-height: 100vh; padding-bottom: 40px; }
.header { background: #fff; border-bottom: 0.5px solid #d1d1d6; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 17px; font-weight: 600; color: #1c1c1e; text-align: center; }
.header p { font-size: 12px; color: #8e8e93; text-align: center; margin-top: 2px; }
.card { background: #fff; border-radius: 12px; margin: 16px 16px 0; overflow: hidden; }
.card-title { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px 6px; }
textarea { width: 100%; min-height: 140px; border: none; outline: none; font-size: 15px; font-family: -apple-system, sans-serif; color: #1c1c1e; padding: 0 16px 16px; resize: none; background: transparent; line-height: 1.5; }
textarea::placeholder { color: #c7c7cc; }
.btn { display: block; width: calc(100% - 32px); margin: 12px 16px 0; padding: 16px; color: #fff; font-size: 17px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; text-align: center; }
.btn-blue { background: #007aff; }
.btn-green { background: #34c759; display: none; }
.btn-link { background: transparent; color: #007aff; display: none; }
.btn:disabled { background: #8e8e93; }
.preview-card { background: #fff; border-radius: 12px; margin: 16px 16px 0; padding: 16px; display: none; }
.preview-title { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.field-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid #f2f2f7; gap: 12px; }
.field-row:last-child { border-bottom: none; }
.field-label { font-size: 14px; color: #8e8e93; min-width: 90px; }
.field-value { font-size: 14px; color: #1c1c1e; font-weight: 500; text-align: right; }
.status-card { background: #fff; border-radius: 12px; margin: 16px 16px 0; padding: 20px 16px; text-align: center; display: none; }
.status-icon { font-size: 40px; margin-bottom: 8px; }
.status-title { font-size: 17px; font-weight: 600; color: #1c1c1e; margin-bottom: 4px; }
.status-sub { font-size: 14px; color: #8e8e93; }
.status-error { font-size: 13px; color: #ff3b30; margin-top: 8px; word-break: break-word; }
</style>
</head>
<body>
<div class="header">
  <h1>Booking Kommo</h1>
  <p>Chateau d'Isigny</p>
</div>
<div class="card">
  <div class="card-title">SMS Booking recu</div>
  <textarea id="smsInput" placeholder="Colle ici le SMS Booking..."></textarea>
</div>
<button class="btn btn-blue" id="btnParse" onclick="parseSMS()">Analyser le SMS</button>
<div class="preview-card" id="previewCard">
  <div class="preview-title">Donnees extraites</div>
  <div id="previewFields"></div>
</div>
<button class="btn btn-green" id="btnSend" onclick="sendToKommo()">Creer le lead dans Kommo</button>
<div class="status-card" id="statusCard">
  <div class="status-icon" id="statusIcon"></div>
  <div class="status-title" id="statusTitle"></div>
  <div class="status-sub" id="statusSub"></div>
  <div class="status-error" id="statusError"></div>
</div>
<button class="btn btn-link" id="btnReset" onclick="resetAll()">Nouvelle reservation</button>

<script>
let parsedData = null;

async function parseSMS() {
  const sms = document.getElementById('smsInput').value.trim();
  if (!sms) { alert('Colle un SMS Booking d\'abord.'); return; }
  const btn = document.getElementById('btnParse');
  btn.disabled = true;
  btn.textContent = 'Analyse en cours...';
  try {
    const res = await fetch('/.netlify/functions/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sms })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    parsedData = data;
    showPreview(data);
  } catch(e) {
    alert('Erreur : ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Analyser le SMS';
  }
}

function showPreview(d) {
  const fields = [
    { label: 'Client', value: d.nom },
    { label: 'Arrivee', value: d.checkin },
    { label: 'Depart', value: d.checkout },
    { label: 'Chambre', value: d.chambre },
    { label: 'Personnes', value: d.personnes },
    { label: 'Montant', value: d.montant }
  ];
  document.getElementById('previewFields').innerHTML = fields.map(f =>
    `<div class="field-row"><span class="field-label">${f.label}</span><span class="field-value">${f.value || '-'}</span></div>`
  ).join('');
  document.getElementById('previewCard').style.display = 'block';
  document.getElementById('btnSend').style.display = 'block';
  document.getElementById('btnParse').disabled = false;
  document.getElementById('btnParse').textContent = 'Analyser le SMS';
}

async function sendToKommo() {
  if (!parsedData) return;
  const btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.textContent = 'Creation en cours...';
  try {
    const res = await fetch('/.netlify/functions/kommo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(parsedData)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showStatus('OK', 'Lead cree !', parsedData.nom + ' est dans Kommo.', '');
  } catch(e) {
    showStatus('ERR', 'Erreur', '', e.message);
  }
}

function showStatus(icon, title, sub, error) {
  document.getElementById('statusIcon').textContent = icon === 'OK' ? '✅' : '❌';
  document.getElementById('statusTitle').textContent = title;
  document.getElementById('statusSub').textContent = sub;
  document.getElementById('statusError').textContent = error;
  document.getElementById('statusCard').style.display = 'block';
  document.getElementById('btnReset').style.display = 'block';
  document.getElementById('btnSend').style.display = 'none';
}

function resetAll() {
  document.getElementById('smsInput').value = '';
  document.getElementById('previewCard').style.display = 'none';
  document.getElementById('statusCard').style.display = 'none';
  document.getElementById('btnReset').style.display = 'none';
  document.getElementById('btnSend').style.display = 'none';
  document.getElementById('btnParse').disabled = false;
  document.getElementById('btnParse').textContent = 'Analyser le SMS';
  parsedData = null;
}
</script>
</body>
</html>
