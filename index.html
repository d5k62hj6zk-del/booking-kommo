<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Booking → Kommo">
<title>Booking → Kommo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f2f2f7;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: #fff;
    border-bottom: 0.5px solid #d1d1d6;
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 600;
    color: #1c1c1e;
    text-align: center;
  }
  .header p {
    font-size: 12px;
    color: #8e8e93;
    text-align: center;
    margin-top: 2px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    margin: 16px 16px 0;
    overflow: hidden;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 16px 6px;
  }
  textarea {
    width: 100%;
    min-height: 140px;
    border: none;
    outline: none;
    font-size: 15px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #1c1c1e;
    padding: 0 16px 16px;
    resize: none;
    background: transparent;
    line-height: 1.5;
  }
  textarea::placeholder { color: #c7c7cc; }
  .btn-parse {
    display: block;
    width: calc(100% - 32px);
    margin: 12px 16px 0;
    padding: 16px;
    background: #007aff;
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-parse:active { opacity: 0.8; }
  .btn-parse:disabled { background: #8e8e93; }

  .preview-card {
    background: #fff;
    border-radius: 12px;
    margin: 16px 16px 0;
    padding: 16px;
    display: none;
  }
  .preview-card.visible { display: block; }
  .preview-title {
    font-size: 12px;
    font-weight: 600;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 0.5px solid #f2f2f7;
    gap: 12px;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label {
    font-size: 14px;
    color: #8e8e93;
    flex-shrink: 0;
    min-width: 90px;
  }
  .field-value {
    font-size: 14px;
    color: #1c1c1e;
    font-weight: 500;
    text-align: right;
  }

  .btn-send {
    display: block;
    width: calc(100% - 32px);
    margin: 12px 16px 0;
    padding: 16px;
    background: #34c759;
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    display: none;
  }
  .btn-send.visible { display: block; }
  .btn-send:active { opacity: 0.8; }
  .btn-send:disabled { background: #8e8e93; }

  .status-card {
    background: #fff;
    border-radius: 12px;
    margin: 16px 16px 0;
    padding: 20px 16px;
    text-align: center;
    display: none;
  }
  .status-card.visible { display: block; }
  .status-icon {
    font-size: 40px;
    margin-bottom: 8px;
  }
  .status-title {
    font-size: 17px;
    font-weight: 600;
    color: #1c1c1e;
    margin-bottom: 4px;
  }
  .status-sub {
    font-size: 14px;
    color: #8e8e93;
  }
  .status-error {
    font-size: 13px;
    color: #ff3b30;
    margin-top: 8px;
    word-break: break-word;
  }

  .btn-reset {
    display: block;
    width: calc(100% - 32px);
    margin: 12px 16px 0;
    padding: 14px;
    background: transparent;
    color: #007aff;
    font-size: 17px;
    font-weight: 500;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    display: none;
  }
  .btn-reset.visible { display: block; }

  .loading-dots span {
    animation: blink 1.2s infinite;
    opacity: 0;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
</style>
</head>
<body>

<div class="header">
  <h1>Booking → Kommo</h1>
  <p>Château d'Isigny</p>
</div>

<div class="card">
  <div class="card-title">SMS Booking reçu</div>
  <textarea id="smsInput" placeholder="Colle ici le SMS Booking…

Exemple :
Nouveau: 6382494831
Jul 10 - Jul 11 2026
1 hébergement, 4 personnes
Anna Warell
Chambre Familiale Supérieure
EUR 156.6"></textarea>
</div>

<button class="btn-parse" id="btnParse" onclick="parseSMS()">Analyser le SMS</button>

<div class="preview-card" id="previewCard">
  <div class="preview-title">Données extraites</div>
  <div id="previewFields"></div>
</div>

<button class="btn-send visible" id="btnSend" style="display:none" onclick="sendToKommo()">Créer le lead dans Kommo</button>

<div class="status-card" id="statusCard">
  <div class="status-icon" id="statusIcon"></div>
  <div class="status-title" id="statusTitle"></div>
  <div class="status-sub" id="statusSub"></div>
  <div class="status-error" id="statusError"></div>
</div>

<button class="btn-reset" id="btnReset" onclick="resetAll()">Nouvelle réservation</button>

<script>
const KOMMO_TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsImp0aSI6ImM5ZDcyOGQ3MjZiNzNmMGZmZWYzYWI1NzAyYWZkZTg0NjcxMWZhMTU2ODgzZmZkOWZmNjIwNzY5M2MwYjBhMjM1MWRkN2FlMTJjYTYyYzRhIn0.eyJhdWQiOiI1Y2M4YzZmYS1lNzNkLTQ1ZmMtODEwYi0yYzlmYzY4ZmQwNDAiLCJqdGkiOiJjOWQ3MjhkNzI2YjczZjBmZmVmM2FiNTcwMmFmZGU4NDY3MTFmYTE1Njg4M2ZmZDlmZjYyMDc2OTNjMGIwYTIzNTFkZDdhZTEyY2E2MmM0YSIsImlhdCI6MTc4MTM2NDY5NCwibmJmIjoxNzgxMzY0Njk0LCJleHAiOjE3OTg2NzUyMDAsInN1YiI6IjE1Mjc1Nzg3IiwiZ3JhbnRfdHlwZSI6IiIsImFjY291bnRfaWQiOjM2NDgzNjIzLCJiYXNlX2RvbWFpbiI6ImtvbW1vLmNvbSIsInZlcnNpb24iOjIsInNjb3BlcyI6WyJwdXNoX25vdGlmaWNhdGlvbnMiLCJmaWxlcyIsImNybSIsImZpbGVzX2RlbGV0ZSIsIm5vdGlmaWNhdGlvbnMiXSwiaGFzaF91dWlkIjoiMzc2OWQyOTgtYzg4My00M2YzLWE4NDAtNjYzMWRhMGZhNmRlIiwiYXBpX2RvbWFpbiI6ImFwaS1jLmtvbW1vLmNvbSJ9.G0MCdTXgV1yo0NfsxIp6ewO7e27resHl-mc2DrtytpwOGdx7LUUVV97L5QDAxAmFzdGWHvQVISPEvrvI9KBwS3Rd4IaPsNh0v1X-ruF3J0Rs3ctf6j2IPO2NSKxl0bq9Xq74dj2tmAz-bSjY1bg-KeJYmRAtR2k9gNCEiZx2576UxKuhQLhYMtv-rZxtJZePi2yGE7ffw2CZQ-BY4GssAf3ce3dXhlFNDZdVLW6UAJLHImtNZTz1BBHc-E8xgtX-kv8bIq6glmyBrSeirickQ6_YEfKC7IkKO9oaNGvwZWWNQ-LbpCrZzULmeXWSspRRRLc4ioGBJGI579sY9uZ4tQ';
const KOMMO_DOMAIN = 'kommocompencil295.kommo.com';
const ANTHROPIC_KEY = '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';

let parsedData = null;

async function parseSMS() {
  const sms = document.getElementById('smsInput').value.trim();
  if (!sms) { alert('Colle un SMS Booking d\'abord.'); return; }

  const btn = document.getElementById('btnParse');
  btn.disabled = true;
  btn.innerHTML = 'Analyse en cours<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Tu es un assistant qui extrait des données de SMS de réservation Booking.com. 
Réponds UNIQUEMENT avec un JSON valide, sans aucun texte avant ou après, sans balises markdown.

Extrait ces champs du SMS :
- nom (prénom + nom du client)
- telephone (numéro de réservation Booking, le nombre après "Nouveau:")
- checkin (date d'arrivée au format DD/MM/YYYY)
- checkout (date de départ au format DD/MM/YYYY)
- chambre (nom de la chambre/hébergement)
- personnes (nombre de personnes)
- montant (montant avec devise, ex: "EUR 156.6")

SMS à analyser :
${sms}

Réponds uniquement avec le JSON, exemple:
{"nom":"Anna Warell","telephone":"6382494831","checkin":"10/07/2026","checkout":"11/07/2026","chambre":"Chambre Familiale Supérieure","personnes":"4","montant":"EUR 156.6"}`
        }]
      })
    });

    const data = await response.json();
    let text = data.content[0].text.trim();
    text = text.replace(/```json|```/g, '').trim();
    parsedData = JSON.parse(text);

    showPreview(parsedData);
  } catch(e) {
    alert('Erreur lors de l\'analyse : ' + e.message);
    btn.disabled = false;
    btn.innerHTML = 'Analyser le SMS';
  }
}

function showPreview(d) {
  const fields = [
    { label: 'Client', value: d.nom },
    { label: 'N° réservation', value: d.telephone },
    { label: 'Arrivée', value: d.checkin },
    { label: 'Départ', value: d.checkout },
    { label: 'Chambre', value: d.chambre },
    { label: 'Personnes', value: d.personnes },
    { label: 'Montant', value: d.montant }
  ];

  document.getElementById('previewFields').innerHTML = fields.map(f =>
    `<div class="field-row">
      <span class="field-label">${f.label}</span>
      <span class="field-value">${f.value || '—'}</span>
    </div>`
  ).join('');

  document.getElementById('previewCard').classList.add('visible');
  document.getElementById('btnSend').style.display = 'block';
  document.getElementById('btnParse').disabled = false;
  document.getElementById('btnParse').innerHTML = 'Analyser le SMS';
}

async function sendToKommo() {
  if (!parsedData) return;

  const btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.innerHTML = 'Création en cours…';

  const leadName = `${parsedData.nom} — ${parsedData.chambre} (${parsedData.checkin} → ${parsedData.checkout})`;
  const note = `Réservation Booking.com\nN° : ${parsedData.telephone}\nArrivée : ${parsedData.checkin}\nDépart : ${parsedData.checkout}\nChambre : ${parsedData.chambre}\nPersonnes : ${parsedData.personnes}\nMontant : ${parsedData.montant}`;

  try {
    const res = await fetch(`https://${KOMMO_DOMAIN}/api/v4/leads/complex`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${KOMMO_TOKEN}`
      },
      body: JSON.stringify([{
        name: leadName,
        price: parseFloat((parsedData.montant || '0').replace(/[^0-9.]/g, '')),
        _embedded: {
          contacts: [{
            name: parsedData.nom,
            custom_fields_values: parsedData.telephone ? [{
              field_code: 'PHONE',
              values: [{ value: parsedData.telephone, enum_code: 'WORK' }]
            }] : []
          }]
        }
      }])
    });

    if (res.ok || res.status === 200) {
      showStatus('✅', 'Lead créé avec succès', `${parsedData.nom} est maintenant dans Kommo`, '');
    } else {
      const err = await res.text();
      showStatus('❌', 'Erreur Kommo', `Statut ${res.status}`, err);
    }
  } catch(e) {
    showStatus('❌', 'Erreur réseau', 'Vérifier la connexion', e.message);
  }
}

function showStatus(icon, title, sub, error) {
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusTitle').textContent = title;
  document.getElementById('statusSub').textContent = sub;
  document.getElementById('statusError').textContent = error;
  document.getElementById('statusCard').classList.add('visible');
  document.getElementById('btnReset').classList.add('visible');
  document.getElementById('btnSend').style.display = 'none';
}

function resetAll() {
  document.getElementById('smsInput').value = '';
  document.getElementById('previewCard').classList.remove('visible');
  document.getElementById('statusCard').classList.remove('visible');
  document.getElementById('btnReset').classList.remove('visible');
  document.getElementById('btnSend').style.display = 'none';
  document.getElementById('btnParse').disabled = false;
  document.getElementById('btnParse').innerHTML = 'Analyser le SMS';
  parsedData = null;
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
